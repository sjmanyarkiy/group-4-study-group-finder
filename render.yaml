databases:
  - name: letsstudy-db
    databaseName: letsstudy
    user: letsstudy_user
    plan: free

services:
  - type: web
    name: letsstudy-api
    runtime: python
    rootDir: api
    buildCommand: pip install -r requirements.txt && flask db upgrade && cd ../client && npm install && npm run build
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: letsstudy-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: app.py